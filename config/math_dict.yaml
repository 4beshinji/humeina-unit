# ────────────────────────────────────────────────
# LLM フォールバックを使う複雑なパターン（正規表現）
# ────────────────────────────────────────────────
# これらのパターンを含む LaTeX 式は辞書変換を諦めてLLMに渡す
llm_trigger_patterns:
  - "\\\\frac"      # 分数
  - "\\\\binom"     # 二項係数
  - "\\\\sum_"      # 添字付き和
  - "\\\\prod_"     # 添字付き積
  - "\\\\int_"      # 積分
  - "\\\\lim_"      # 極限
  - "\\\\underset"  # 下付き装飾
  - "\\\\overset"   # 上付き装飾
  - "\\\\begin\\{" # 環境（matrix等）
