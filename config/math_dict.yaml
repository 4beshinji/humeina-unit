  # 型シグネチャ
  "::": "の型は"
  "->": "から"
  "=>": "制約付きで"
  ":": "コンス"
  "|": "または"
  "\\": "ラムダ"  # λ

  # モナド・アプリカティブ
  ">>=": "バインド"
  ">>": "then"
  "=<<": "逆バインド"
  "<$>": "ファンクターマップ"
  "<*>": "アプリカティブ適用"
  "<>": "モノイド結合"
  "mempty": "単位元"
  "mappend": "結合"
  "mconcat": "結合リスト"
  "return": "モナド返す"
  "pure": "持ち上げる"
  "fmap": "ファンクターマップ"
  "bind": "バインド"

  # Kleisli
  ">=>": "クライスリ合成"
  "<=<": "逆クライスリ合成"

  # 型クラス・型コンストラクタ
  "Maybe": "メイビー"
  "Nothing": "ナッシング"
  "Just": "ジャスト"
  "Either": "イーザー"
  "Left": "レフト"
  "Right": "ライト"
